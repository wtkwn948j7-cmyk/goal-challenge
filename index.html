<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goal Challenge</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<div id="menu">

<h1>⚽ Goal Challenge</h1>

<p>Reach your target using football players.</p>

<div class="goal-grid">

<button class="goal" data-goal="1000">1000</button>

<button class="goal" data-goal="3000">3000</button>

<button class="goal" data-goal="5000">5000</button>

<button class="goal" data-goal="10000">10000</button>

</div>

<button id="start">START</button>

</div>

<div id="game" style="display:none;">

<div class="top">

<div>

<h2 id="targetText">Target : 1000</h2>

<p id="scoreText">0 Goals</p>

</div>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<div class="player-card">

<img id="playerImage"
src="https://placehold.co/250x250/png?text=Player">

<h2 id="playerName">Loading...</h2>

</div>

<div class="choices">

<button>🏟 Club Goals</button>

<button>🌍 Country Goals</button>

<button>🏆 UCL Goals</button>

<button>⭐ League Goals</button>

<button>🔥 ×2</button>

<button>⚡ ×5</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
