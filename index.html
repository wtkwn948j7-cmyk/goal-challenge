<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goal Challenge</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<div id="menu">

<h1>⚽ Goal Challenge</h1>

<p>Reach your target using football players.</p>

<h2>Select Difficulty</h2>

<div class="difficulty-grid">

<button class="difficulty selected" data-difficulty="easy">
🟢 Easy
</button>

<button class="difficulty" data-difficulty="medium">
🟡 Medium
</button>

<button class="difficulty" data-difficulty="hard">
🟠 Hard
</button>

<button class="difficulty" data-difficulty="impossible">
🔴 Impossible
</button>

</div>

<h2>Select Goal</h2>

<div class="goal-grid">

<button class="goal selected" data-goal="1000">1000</button>
<button class="goal" data-goal="3000">3000</button>
<button class="goal" data-goal="5000">5000</button>
<button class="goal" data-goal="10000">10000</button>

</div>

<button id="start">
🚀 START GAME
</button>

</div>

<div id="game" style="display:none;">

<div class="top">

<div>

<h2 id="targetText"></h2>

<p id="scoreText"></p>

<p id="livesText"></p>

<p id="boostText">
🔥 x2:1 | ⚡ x5:1
</p>

</div>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<div class="player-card">

<img
id="playerImage"
src="https://placehold.co/250x250/png?text=Loading">

<h2 id="playerName">
Loading...
</h2>

</div>

<div class="choices">

<button id="clubBtn">🏟 Club Goals</button>

<button id="countryBtn">🌍 Country Goals</button>

<button id="uclBtn">🏆 UCL Goals</button>

<button id="leagueBtn">🥇 League Goals</button>

<button id="x2Btn">🔥 ×2</button>

<button id="x5Btn">⚡ ×5</button>

</div>

</div>

</div>

<script src="players.js"></script>
<script src="script.js"></script>

</body>
</html>
