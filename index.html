<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Challenge ⚽</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="container">

    <h1>⚽ Goal Challenge</h1>
    <p class="subtitle">Can you reach the target?</p>

    <div class="card">

        <h2>Select Goal</h2>

        <div class="goal-buttons">
            <button class="goal-btn" data-goal="1000">1000</button>
            <button class="goal-btn" data-goal="3000">3000</button>
            <button class="goal-btn" data-goal="5000">5000</button>
            <button class="goal-btn" data-goal="10000">10000</button>
        </div>

        <button id="startBtn">
            START GAME
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
